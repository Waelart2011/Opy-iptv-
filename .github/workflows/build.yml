name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          libffi-dev libssl-dev build-essential \
          libltdl-dev zlib1g-dev autoconf libtool \
          libncurses5-dev libsqlite3-dev

    - name: Install buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer "cython==0.29.33" virtualenv

    - name: Build APK
      run: |
        buildozer android debug 2>&1 | tee build.log || true
        tail -50 build.log

    - name: Upload log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: OPY-IPTV-V18.9
        path: bin/*.apk
        if-no-files-found: warn
