name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3 python3-pip \
          git zip unzip \
          openjdk-17-jdk \
          libffi-dev libssl-dev \
          build-essential \
          libltdl-dev libgdbm-dev \
          libbz2-dev zlib1g-dev \
          libncurses5-dev libsqlite3-dev \
          libreadline-dev libtk8.6 \
          libgdm-dev libdb4o-cil-dev \
          libpcap-dev autoconf libtool

    - name: Install Python deps
      run: |
        pip3 install --upgrade pip
        pip3 install buildozer cython virtualenv

    - name: Accept Android licenses
      run: |
        mkdir -p ~/.android
        echo "count=0" > ~/.android/repositories.cfg

    - name: Build APK
      run: |
        cd $GITHUB_WORKSPACE
        buildozer android debug 2>&1 | tail -50

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: OPY-IPTV-V18.9
        path: bin/*.apk
        if-no-files-found: error
